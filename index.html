<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | UTM to Lat/Long</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <link rel="stylesheet" href="./style/main.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.2/dist/leaflet.css" integrity="sha256-sA+zWATbFveLLNqWO2gtiw3HL/lh1giY/Inf1BJ0z14=" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.2/dist/leaflet.js" integrity="sha256-o9N1jGDZrf5tS+Ft4gbIK7mYMipq9lqpVJ91xHSyKhg=" crossorigin=""></script>
</head>  
<body>
  <header>
    <a href="http://" target="_blank" rel="noopener noreferrer" id="logo"><h1>UTM to Lat/Lon</h1></a>
    <a href="https://www.npaid.org/" target="_blank" rel="noopener noreferrer">
      <img src="./images/npaid.svg" alt="Norwegian People's Aid Logo">
    </a>
  </header>
  <main>
    <div class="card" aria-label="UTM converter" id="converterPanel">
      <div class="panel-content" id="panelContent">
        <form id="utmForm" onsubmit="start(event)">
          <label for="utm_coordinate">UTM Coordinate</label>
          <input id="utm_coordinate" name="utm_coordinate" type="text" placeholder="33N 500000 4649776" required>
          <button type="submit" class="btn">Convert</button>
        </form>

        <div class="results" aria-live="polite">
          <hr class="divider">
          <div class="row"><span class="label muted">Result</span></div>
          <div class="row coord-row"><span id="lat_long" class="value"></span></div>
          <div class="copy-row">
            <button id="copyBtn" class="copy_btn" type="button" onclick="copyLatLong()" aria-label="Copy latitude and longitude">
              <img src="./images/copy-regular-full.svg" alt="Copy">
            </button>
          </div>
          <div class="precision-note">Coordinates shown in WGS84 (decimal degrees)</div>
        </div>
      </div>
    </div>

    <div class="map_wrapper" id="map"></div>

  </main>
  <script>
    //Creating map options
    var map_option = {
      center: [-7.620171, 15.062503],
      zoom: 15,
      // Enable mouse wheel / touchpad zoom, touch pinch zoom, and common zoom interactions
      scrollWheelZoom: true,
      touchZoom: true,
      doubleClickZoom: true,
      boxZoom: true,
      // Remove built-in zoom control buttons (we'll keep the map interaction clean)
      zoomControl: false,
    }

    //Creating map object
    var map = new L.map('map', map_option);

    //Creating layer object
    var layer = new L.TileLayer('http://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');

    //Adding layer to the map
    map.addLayer(layer);

    //Creating a marker
    var marker = L.marker([-7.620171, 15.062503]);
    map.setView([-7.620171, 15.062503]);
    //Adding marker to the o map
    marker.addTo(map);

    function updateMarkerPosition (lat, long) {
        marker.setLatLng([lat, long]);
        map.setView([lat, long]);
    }
  </script>
  
  <footer>
    Footer
  </footer>
  <script src="./script/UTMConversion.js"></script>
</body>
</html>
