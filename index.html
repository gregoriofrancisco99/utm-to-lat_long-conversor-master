<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | UTM to Lat/Long</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <link rel="stylesheet" href="./style/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.2/dist/leaflet.css" integrity="sha256-sA+zWATbFveLLNqWO2gtiw3HL/lh1giY/Inf1BJ0z14=" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.2/dist/leaflet.js" integrity="sha256-o9N1jGDZrf5tS+Ft4gbIK7mYMipq9lqpVJ91xHSyKhg=" crossorigin=""></script>
</head>
<body>
  <header>

    <a href="#home"><img id="logo" src="./images/npa_logo.png" alt="Norwegian People's Aid Logo"></a>

    <nav id="menu hide">
      <ul>
        <li><a href="#home">Tool</a></li>
        <li><a href="#about">History</a></li>
        <li><a href="#contact">Guide</a></li>
      </ul>
    </nav>

    <nav class="settings hide" >
      <ul>
        <li><a href="#settings"><i class="fa-solid fas fa-globe" aria-hidden="true"></i> <span class="sr_only">Language</span></a></li>
        <li><a href="#settings"><i class="fa-solid fas fa-gear" aria-hidden="true"></i> <span class="sr_only">Settings</span></a></li>
      </ul>
    </nav>
  </header>

  <main>
    <article>
      <header>
        <h1>UTM to Lat/Long</h1>
      </header>
      <section id="coord__handling">
        <form id="coord__form">
          <input type="text" id="utm_coordinate" placeholder="33M 454323 5654567" required>
          <button><i class="fa-solid fa-arrow-right"></i><span class="sr_only">Convert</span></button>
        </form>
        
        <table class="table" aria-label="Coordinate results">
          <thead>
            <tr>
              <th scope="col">UTM Coordinate</th>
              <th scope="col">Latitude</th>
              <th scope="col">Longitude</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><strong id="utm">33M 454323 5654567</strong></td>
              <td><strong id="latitude">-7.620171</strong></td>
              <td><strong id="longitude">15.062503</strong></td>
            </tr>
          </tbody>
        </table>
      </section>
    </article>

    <div class="map_holder">
      <div class="map_wrapper" id="map"></div>
    </div>
  
  </main>

  <footer>
    <p> &copy; 2023 <a href="https://www.npaid.org/" target="_blank" rel="noopener">Norwegian People's Aid</a>. All rights reserved.</p>
  </footer>

<script>
    //Creating map options
    var map_option = {
        center: [-7.620171, 15.062503],
        zoom: 15,
        scrollWheelZoom: false,
    }

    //Creating map object
    var map = new L.map('map', map_option);

    //Creating layer object
    var layer = new L.TileLayer('http://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');

    //Adding layer to the map
    map.addLayer(layer);

    //Creating a marker
    var marker = L.marker([-7.620171, 15.062503]);
    map.setView([-7.620171, 15.062503]);
    //Adding marker to the o map
    marker.addTo(map);

    function updateMarkerPosition (lat, long) {
        marker.setLatLng([lat, long]);
        map.setView([lat, long]);
    }
  </script>
  
  <script src="./script/UTMConversion.js"></script>
</body>
</html>
